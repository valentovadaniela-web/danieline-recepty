<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danieline recepty</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="hero small-hero">

    <div class="overlay print-header">

        <div class="print-info">

            <h1 id="recipe-title"></h1>

        </div>

    </div>

</header>

<main>

  <div class="container recipe-detail">

    <div class="recipe-layout">

      <div class="recipe-image">
        <img id="recipe-image" class="detail-image" alt="">
      </div>

      <aside class="ingredients-box">

    <div id="recipe-categories"></div>

    <div id="recipe-meta"></div>

    <button class="print-btn" onclick="window.print()">
        🖨️ Tlačiť recept
    </button>

    <h2>Ingrediencie</h2>

    <ul id="ingredients"></ul>

</aside>

      <section class="recipe-steps">
        <h2>Postup</h2>
        <ol id="instructions"></ol>
      </section>

    </div>

    <a href="index.html" class="back-btn">
      ← Späť na recepty
    </a>

  </div>

</main>

<script src="assets/js/recipe.js"></script>

</body>
</html>
