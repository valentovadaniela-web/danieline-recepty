<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danieline recepty</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    /* Štýly pre tlač priamo v HTML */
    @media print {
      /* SKRYTIE NEPOTREBNÝCH PRVKOV */
      .hero:not(.small-hero),
      .search-boxes,
      .sort-buttons,
      .categories,
      .print-btn,
      .back-btn,
      footer {
        display: none !important;
      }

      /* SMALL HERO – flex kontajner pre nadpis + fotku */
      .small-hero {
        background: none !important;
        height: auto !important;
        padding: 0 !important;
        margin: 0 0 20px 0 !important;
        min-height: 0 !important;
      }

      .small-hero .overlay {
        position: static !important;
        margin: 0 !important;
        padding: 0 !important;
        display: flex !important;
        flex-direction: row !important;
        align-items: flex-start !important;
        gap: 30px !important;
        width: 100% !important;
        text-align: left !important;
      }

      /* ĽAVÁ ČASŤ – nadpis + kategórie */
      .print-left {
        flex: 1 !important;
        max-width: 52% !important;
      }

      /* PRAVÁ ČASŤ – fotka */
      .print-right {
        flex: 0 0 45% !important;
        max-width: 45% !important;
      }

      /* HLAVNÝ KONTAJNER */
      .recipe-detail {
        max-width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      .recipe-layout {
        display: block !important;
        max-width: 100% !important;
      }

      /* === FOTKA === */
      .detail-image {
        display: block !important;
        width: 100% !important;
        height: auto !important;
        border-radius: 4px !important;
        border: 1px solid #ccc !important;
      }

      /* Skryť pôvodný recipe-image */
      .recipe-image {
        display: none !important;
      }

      /* === NADPIS – vľavo vedľa fotky === */
      #recipe-title {
        font-size: 22pt !important;
        color: #b07a4a !important;
        font-weight: bold !important;
        border-bottom: 2px solid #b07a4a !important;
        padding-bottom: 8px !important;
        line-height: 1.3 !important;
        margin: 0 0 6px 0 !important;
        width: 100% !important;
      }

      /* KATEGÓRIE – pod nadpisom */
      #recipe-categories,
      #recipe-meta {
        width: 100% !important;
        margin-bottom: 6px !important;
        font-size: 11pt !important;
        color: #666 !important;
      }

      .badge {
        display: inline-block !important;
        background: none !important;
        color: #4b3621 !important;
        padding: 0 8px 0 0 !important;
        font-weight: normal !important;
        font-size: 11pt !important;
      }

      /* === INGREDIENCIE – pod fotkou, 2 stĺpce === */
      .ingredients-box {
        clear: both !important;
        display: block !important;
        margin-top: 20px !important;
        padding: 15px 0 0 0 !important;
        background: none !important;
        border: none !important;
        box-shadow: none !important;
        border-top: 1px solid #ddd !important;
        column-count: 2 !important;
        column-gap: 40px !important;
        width: 100% !important;
        position: static !important;
        top: auto !important;
      }

      .ingredients-box h2 {
        column-span: all !important;
        font-size: 16pt !important;
        color: #b07a4a !important;
        margin: 0 0 12px 0 !important;
        padding-bottom: 4px !important;
        border-bottom: 1px solid #b07a4a !important;
      }

      .ingredients-box ul {
        padding-left: 20px !important;
        margin: 0 !important;
      }

      .ingredients-box li {
        break-inside: avoid !important;
        margin-bottom: 6px !important;
        font-size: 12pt !important;
        line-height: 1.4 !important;
      }

      /* Skryť tlačidlo v ingredienciách */
      .ingredients-box .print-btn {
        display: none !important;
      }

      /* === POSTUP – láme sa medzi odsekmi === */
      .recipe-steps {
        margin-top: 10px !important;
        break-inside: auto !important;
        page-break-inside: auto !important;
      }

      .recipe-steps h2 {
        font-size: 16pt !important;
        color: #b07a4a !important;
        margin: 15px 0 10px 0 !important;
        border-bottom: 1px solid #b07a4a !important;
        padding-bottom: 4px !important;
      }

      #instructions {
        background: none !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
        break-inside: auto !important;
        page-break-inside: auto !important;
      }

      #instructions ol,
      #instructions ul {
        padding-left: 25px !important;
        margin: 0 !important;
      }

      #instructions li {
        break-inside: avoid !important;
        page-break-inside: avoid !important;
        margin-bottom: 14px !important;
        font-size: 12.5pt !important;
        line-height: 1.6 !important;
      }

      #instructions p {
        break-inside: auto !important;
        page-break-inside: auto !important;
      }
    }
  </style>
</head>
<body>

<header class="hero small-hero">
  <div class="overlay">
    <!-- ĽAVÁ ČASŤ: Nadpis + kategórie -->
    <div class="print-left">
      <h1 id="recipe-title">Recept</h1>
      <div id="recipe-categories"></div>
      <div id="recipe-meta"></div>
    </div>
    <!-- PRAVÁ ČASŤ: Fotka -->
    <div class="print-right">
      <img id="recipe-image" class="detail-image" src="" alt="Fotka receptu">
    </div>
  </div>
</header>

<main>

  <div class="container recipe-detail">

    <div class="recipe-layout">

      <!-- Pôvodný obrázok (viditeľný len na obrazovke) -->
      <div class="recipe-image">
        <img id="recipe-image-screen" class="detail-image" src="" alt="Fotka receptu">
      </div>

      <aside class="ingredients-box">

        <button class="print-btn" onclick="window.print()">
          🖨️ Tlačiť recept
        </button>

        <h2>Ingrediencie</h2>

        <ul id="ingredients"></ul>

      </aside>

      <section class="recipe-steps">
        <h2>Postup</h2>
        <ol id="instructions"></ol>
      </section>

    </div>

    <a href="index.html" class="back-btn">
      ← Späť na recepty
    </a>

  </div>

</main>

<script src="assets/js/recipe.js"></script>

<script>
  // Po načítaní stránky skopírujeme zdroj obrázka do oboch verzií
  document.addEventListener('DOMContentLoaded', function() {
    const imageSrc = 'https://images.unsplash.com/photo-1519671482749-fd09be7ccebf?q=80&w=600';
    const imgPrint = document.getElementById('recipe-image');
    const imgScreen = document.getElementById('recipe-image-screen');
    
    if (imgPrint) imgPrint.src = imageSrc;
    if (imgScreen) imgScreen.src = imageSrc;
  });
</script>

</body>
</html>
